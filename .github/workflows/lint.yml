name: Lint

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint:
        name: Ruff + Mypy
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.13"
                cache: "pip"

            - name: Install dependencies
              run: pip install -e ".[dev]"

            - name: Run Ruff linter
              run: ruff check .

            - name: Run Ruff formatter check
              run: ruff format --check .

            - name: Run Mypy
              run: mypy src/
